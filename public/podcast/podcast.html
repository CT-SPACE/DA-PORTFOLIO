<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AI Podcast Christina Troitzsch -</title>
        <link rel="stylesheet" type="text/css" href="podcast.css">
        <script src="podcast.js" defer></script>
    </head>
    <body>
        <div class="diagonal"><img alt="KI Audio Icon" class="ki" src="/assets/img/audio_ki.svg"></div>
        <h2 class="podcast-title">AI based Podcast</h2>
        <span> - about Christina Troitzsch -</span>
        <div class="sound">
            <div class="woofer btn">
                <img alt="subwoofer" src="/assets/img/audio_woofer.svg" class="woofer-animated">
            </div>
               <div class="device-volume-hint" role="status" aria-live="polite" hidden>
                        Kein Ton? Prüfe die Laufstärke an deinem Smartphone.
               </div>
            <div class="volume">
                <div class="volumeButton">
                    <button title="leiser" class="leiser volumeChange"></button>
                        <img alt="Ton Lauter" src="/assets/img/audio_speaker.svg" class="speaker">
                        <button title="lauter" class="lauter volumeChange"></button>
                    </div>
                 
                    <button title="Play - Pause" class="onoff"></button>
                </div>
            </div>
            <div class="diagonal reverse">
<h1 class="rotate180"><a rel="noopener noreferrer" href="https://www.troitzsch.de/#sayHiSection" target="_blank">SAY HI!</a></h1>
            </div>
        </body>
    </html>
